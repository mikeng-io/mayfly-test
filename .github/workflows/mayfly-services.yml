name: mayfly-services
on:
  workflow_dispatch:
jobs:
  integration:
    runs-on: [self-hosted, mayfly]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Query the Postgres service container
        run: |
          set -eux
          apt-get update && apt-get install -y --no-install-recommends postgresql-client
          for i in $(seq 1 20); do pg_isready -h 127.0.0.1 -p 5432 -U postgres && break; sleep 2; done
          PGPASSWORD=postgres psql -h 127.0.0.1 -p 5432 -U postgres -tAc 'select version();'
          echo "SERVICES_OK arch=$(uname -m)"
